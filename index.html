<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirDrop Recharge | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .airdrop-float {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(15px) rotate(5deg); }
        }

        .premium-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pack-active { border: 2px solid #3b82f6 !important; background: rgba(59, 130, 246, 0.1); }
        .locked { opacity: 0.3; pointer-events: none; filter: blur(1px); transition: 0.3s; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4">

    <div class="airdrop-float">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-2 rounded-xl shadow-lg shadow-blue-500/40">
            <p class="text-[10px] font-black italic text-blue-100">AIRDROP ACTIVE 📦</p>
        </div>
    </div>

    <div class="max-w-md mx-auto py-10">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">AIRDROP</h1>
            <p class="text-gray-500 text-xs font-bold tracking-widest uppercase">Premium MLBB Service</p>
        </div>

        <div id="auth-ui" class="premium-card p-6 rounded-3xl mb-8 border-b-4 border-blue-600">
            <h2 class="text-xl font-bold mb-4">Register Storage</h2>
            <input type="text" id="user_name" placeholder="Enter Your Name" class="w-full bg-slate-900 p-4 rounded-2xl outline-none focus:ring-1 ring-blue-500">
            <button onclick="createAccount()" class="w-full bg-blue-600 mt-4 py-4 rounded-2xl font-black shadow-lg">CREATE ACCOUNT</button>
        </div>

        <div id="main-app" class="hidden">
            <div class="premium-card p-6 rounded-3xl mb-6">
                <label class="text-[10px] font-bold text-gray-500 mb-2 block uppercase">MLBB Identification</label>
                <div class="flex gap-2">
                    <input type="number" id="uid" placeholder="User ID" class="w-full bg-slate-900 p-4 rounded-xl outline-none">
                    <input type="number" id="zid" placeholder="Zone" class="w-24 bg-slate-900/50 p-4 rounded-xl outline-none">
                </div>
                <button onclick="verifyUser()" id="v-btn" class="w-full mt-3 bg-blue-600/20 text-blue-400 py-3 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition">VERIFY PLAYER</button>
                <div id="player-display" class="mt-4 text-center font-black text-emerald-400 italic tracking-widest"></div>
            </div>

            <div id="pack-section" class="locked">
                <h3 class="text-xs font-bold text-gray-500 mb-3 tracking-widest uppercase px-2">Micro Diamonds</h3>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div onclick="selectP(this, 10)" class="premium-card p-4 rounded-2xl text-center cursor-pointer">
                        <div class="text-lg font-bold">3 <span class="text-xs">D</span></div>
                        <div class="text-blue-500 font-bold">₹10</div>
                    </div>
                    <div onclick="selectP(this, 26)" class="premium-card p-4 rounded-2xl text-center cursor-pointer">
                        <div class="text-lg font-bold">15 <span class="text-xs">D</span></div>
                        <div class="text-blue-500 font-bold">₹26</div>
                    </div>
                </div>

                <h3 class="text-xs font-bold text-gray-500 mb-3 tracking-widest uppercase px-2">Bulk Recharge</h3>
                <div class="space-y-3">
                    <div onclick="selectP(this, 390)" class="premium-card p-5 rounded-2xl flex justify-between items-center cursor-pointer">
                        <div><div class="font-bold">275 + 225 Bonus</div><div class="text-[10px] text-gray-400">Monthly Promo</div></div>
                        <div class="text-xl font-black">₹390</div>
                    </div>
                    <div onclick="selectP(this, 1600)" class="premium-card p-5 rounded-2xl flex justify-between items-center cursor-pointer">
                        <div><div class="font-bold">1100 + 900 Bonus</div><div class="text-[10px] text-gray-400">Collector's Choice</div></div>
                        <div class="text-xl font-black">₹1600</div>
                    </div>
                </div>

                <button onclick="openPay()" class="w-full bg-blue-600 py-5 rounded-3xl mt-8 font-black text-lg shadow-xl shadow-blue-900/30">CHECKOUT</button>
            </div>
        </div>

        <div id="pay-screen" class="hidden fixed inset-0 bg-slate-950 z-[2000] p-10 flex flex-col items-center justify-center">
            <h2 class="text-3xl font-black italic mb-2">PAYMENT</h2>
            <div class="bg-white p-6 rounded-3xl mb-10 shadow-2xl">
                <img src="YOUR_QR_CODE_LINK" class="w-52 h-52" alt="QR">
            </div>
            <button onclick="done(true)" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-4">I HAVE PAID</button>
            <button onclick="done(false)" class="w-full bg-slate-800 py-4 rounded-2xl font-bold text-gray-500">BACK</button>
        </div>

    </div>

    <script>
        let selectedPrc = 0;

        function createAccount() {
            const name = document.getElementById('user_name').value;
            if(!name) return alert("Enter your name!");
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        async function verifyUser() {
            const id = document.getElementById('uid').value;
            const zone = document.getElementById('zid').value;
            const btn = document.getElementById('v-btn');
            const display = document.getElementById('player-display');

            if(!id || !zone) return alert("Fill ID and Zone!");

            btn.innerText = "CONNECTING TO MOONTON...";
            display.innerText = "";

            try {
                // Using the specific API URL from your curl request
                const response = await fetch(`https://check-id-game1.p.rapidapi.com/api/game/cek-region-mlbb-m?zone=${zone}&id=${id}`, {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-host': 'check-id-game1.p.rapidapi.com',
                        'x-rapidapi-key': '65b3e66983mshb40b4e50c338bb1p18c537jsn71590a0df9b4'
                    }
                });
                
                const result = await response.json();
                console.log("Full Data:", result);

                // FIX: Check every possible location for the username
                const username = result.username || 
                                 (result.data && result.data.username) || 
                                 (result.data && result.data.nickname) ||
                                 result.name;

                if(username) {
                    display.innerText = "✅ " + username.toUpperCase();
                    document.getElementById('pack-section').classList.remove('locked');
                } else {
                    display.innerText = "❌ USER NOT FOUND";
                    alert("ID found, but username data is hidden or empty. Try again.");
                }
            } catch (err) {
                console.error(err);
                alert("Connection Failed. Check your internet or API key.");
            } finally {
                btn.innerText = "VERIFY PLAYER";
            }
        }

        function selectP(el, prc) {
            document.querySelectorAll('.premium-card').forEach(c => c.classList.remove('pack-active'));
            el.classList.add('pack-active');
            selectedPrc = prc;
        }

        function openPay() {
            if(selectedPrc === 0) return alert("Pick a pack!");
            document.getElementById('pay-screen').classList.remove('hidden');
        }

        function done(ok) {
            if(ok) {
                alert("Order recorded. Verifying transaction hash...");
                location.reload();
            } else {
                document.getElementById('pay-screen').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
